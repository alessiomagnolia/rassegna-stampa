<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicati Stampa | Rassegna Stampa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        body { overflow: hidden; }
        
        .app-layout {
            display: flex; height: calc(100vh - 60px);
        }

        /* Navbar Sidebar */
        .sidebar {
            width: 280px; flex-shrink: 0;
            background: rgba(10,10,26,0.95);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
            color: #efece5;
        }
        .sidebar-header {
            padding: 1.5rem; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-header h2 { font-size: 1.1rem; margin: 0; }
        .back-btn {
            background: rgba(255,255,255,0.05); color: #efece5;
            border: 1px solid rgba(255,255,255,0.1); padding: 5px 10px;
            border-radius: 6px; text-decoration: none; font-size: 0.85rem;
            transition: var(--transition);
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); }
        
        .history-list {
            flex-grow: 1; overflow-y: auto; padding: 1rem;
        }
        .history-item {
            padding: 0.75rem; border-radius: 8px;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
            margin-bottom: 0.5rem; cursor: pointer; transition: var(--transition);
        }
        .history-item:hover {
            background: rgba(255,255,255,0.06); border-color: var(--border-color);
        }
        .history-item.active {
            background: rgba(147, 51, 234, 0.15); border-color: var(--accent-primary);
        }
        .h-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .h-client { font-size: 0.75rem; color: var(--accent-primary); margin-bottom: 0.25rem; }
        .h-date { font-size: 0.7rem; color: var(--text-muted); }
        .h-badge { display: inline-block; padding: 2px 6px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-radius: 4px; font-size: 0.65rem; margin-left: 5px; }

        /* Main Content */
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column;
            background: var(--bg-color); position: relative;
            padding-top: 0 !important; min-height: 0 !important;
        }
        
        .top-bar {
            height: 60px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; background: rgba(10,10,26,0.95);
            color: #efece5;
        }
        .top-bar h1 { font-size: 1.25rem; margin: 0; }
        .top-actions { display: flex; gap: 1rem; }
        
        .workspace {
            display: flex; flex-grow: 1; overflow: hidden;
        }
        
        /* Generator Form */
        .generator-form {
            width: 450px; flex-shrink: 0; padding: 2rem;
            border-right: 1px solid var(--border-color);
            overflow-y: auto; background: transparent;
        }
        .form-group { margin-bottom: 2rem; }
        
        .btn-generate {
            width: 100%; padding: 1rem; border-radius: 0;
            background: transparent;
            color: var(--text-primary); border: 1px solid var(--border-color);
            font-family: var(--font-sans); font-weight: 500; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 0.1em;
            cursor: pointer; transition: var(--transition);
            display: flex; justify-content: center; align-items: center; gap: 0.5rem;
        }
        .btn-generate:hover { background: var(--text-primary); color: var(--bg-primary); }
        .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
        /* Editor Area */
        .editor-container {
            flex-grow: 1; padding: 2rem; display: flex; flex-direction: column;
            background: url('data:image/svg+xml;utf8,<svg width="20" height="20" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.05)"/></svg>');
        }
        .editor-paper {
            flex-grow: 1; background: var(--bg-secondary);
            border: 1px solid var(--border-color); border-radius: 0;
            box-shadow: none;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .editor-toolbar {
            padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color);
            display: flex; gap: 0.5rem; background: rgba(0,0,0,0.3);
        }
        .editor-textarea {
            flex-grow: 1; width: 100%; border: none; background: transparent;
            color: var(--text-primary); font-family: var(--font-serif); font-size: 1.1rem;
            line-height: 1.6; padding: 2rem; resize: none;
        }
        .editor-textarea:focus { outline: none; }

        /* Loader */
        .loader {
            display: none; border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid white; border-radius: 50%;
            width: 20px; height: 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Datalist styling for autocomplete */
        datalist { display: none; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <!-- ===== TOP NAVBAR ===== -->
    <nav class="navbar" style="position: relative; z-index: 1000; height: 60px; background: rgba(10,10,26,0.95); color: #efece5; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div class="nav-left">
            <a href="dashboard.html" class="nav-brand" style="text-decoration:none; color:inherit;">Rassegna Stampa</a>
        </div>
        <div class="nav-user">
            <div id="navCompany" class="nav-company">Caricamento...</div>
            <img id="navLogo" src="" alt="Logo" class="nav-logo hidden">
            <button id="themeToggle" class="btn btn-outline btn-sm" title="Cambia Tema" style="margin-right: 8px;"><i data-feather="moon" style="width:16px;height:16px;"></i></button>
            <a href="dashboard.html" class="btn btn-outline btn-sm" style="margin-right: 10px;">Home</a>
            <button id="btnLogout" class="btn btn-outline btn-sm">Esci</button>
        </div>
    </nav>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Cronologia</h2>
                <a href="dashboard.html" class="back-btn">← Dashboard</a>
            </div>
            <div class="history-list" id="historyList">
                <!-- History items will be injected here -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1>Generatore Comunicati AI</h1>
                <div class="top-actions">
                    <button id="btnNew" class="btn btn-secondary">Nuovo Comunicato</button>
                    <button id="btnSave" class="btn btn-primary" style="display:none;">Salva Modifiche</button>
                    <button id="btnDelete" class="btn btn-danger" style="display:none;">Elimina</button>
                    <button id="btnCopy" class="btn btn-secondary" style="display:none;">Copia Testo</button>
                </div>
            </header>

            <div class="workspace">
                <!-- Generator Form -->
                <div class="generator-form" id="generatorForm">
                    <div class="form-group">
                        <label for="clientName">Cliente / Azienda (Opzionale)</label>
                        <input type="text" id="clientName" class="form-control" list="clientList" placeholder="Es. Acme Corp">
                        <datalist id="clientList"></datalist>
                        <small style="color:var(--text-muted); font-size:0.75rem; margin-top:4px; display:block;">
                            Il sistema imparerà il Tone of Voice per ogni cliente dai comunicati passati.
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="prTitle">Titolo / Argomento Principale *</label>
                        <input type="text" id="prTitle" class="form-control" placeholder="Es. Lancio del nuovo smartphone X10" required>
                    </div>

                    <div class="form-group">
                        <label for="prLength">Lunghezza</label>
                        <select id="prLength" class="form-control">
                            <option value="5-10 righe">Breve (5-10 righe)</option>
                            <option value="10-15 righe" selected>Medio (10-15 righe)</option>
                            <option value="15-30 righe">Lungo (15-30 righe)</option>
                            <option value="oltre 30 righe">Molto Lungo (30+ righe)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="prInstructions">Istruzioni Aggiuntive / Punti Chiave</label>
                        <textarea id="prInstructions" class="form-control" placeholder="Inserisci dettagli, citazioni da includere, o informazioni specifiche..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="prManualExamples">Addestramento Tone of Voice (Opzionale)</label>
                        <textarea id="prManualExamples" class="form-control" placeholder="Incolla qui un vecchio comunicato di questo cliente. L'AI ne studierà lo stile e il lessico per replicarlo."></textarea>
                    </div>

                    <button id="btnGenerate" class="btn-generate">
                        <span class="loader" id="generateLoader"></span>
                        <span id="generateText">Genera Comunicato Stampa</span>
                    </button>
                    
                    <div id="errorMsg" style="color:#ef4444; margin-top:1rem; font-size:0.85rem; display:none;"></div>
                </div>

                <!-- Editor Area -->
                <div class="editor-container">
                    <div class="editor-paper">
                        <div class="editor-toolbar">
                            <span style="font-size:0.85rem; color:var(--text-muted); padding:5px;">Editor Testuale</span>
                        </div>
                        <textarea id="prContent" class="editor-textarea" placeholder="Il comunicato generato apparirà qui. Puoi modificarlo liberamente prima di salvarlo o copiarlo."></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="ui.js"></script>
    <script src="press.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof feather !== 'undefined') {
                feather.replace();
            }
        });
    </script>
</body>
</html>
